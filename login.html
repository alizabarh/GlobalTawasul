<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTawasul - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { vazir: ['Vazirmatn', 'sans-serif'] } }
            }
        }
    </script>
    <style>
        /* Theme Toggle Styles */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--app-card);
            border: 1px solid var(--app-border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Professional Dark Theme - High Contrast */
        :root, [data-theme="dark"] {
            --app-bg: #0d1117;
            --app-card: #161b22;
            --app-input: #21262d;
            --app-border: #30363d;
            --app-text: #f0f6fc;
            --app-text-secondary: #8b949e;
            --app-muted: #6e7681;
            --app-primary: #58a6ff;
            --app-primary-hover: #79b8ff;
            --app-success: #3fb950;
            --app-success-bg: #1f3d2a;
            --app-danger: #f85149;
            --app-danger-bg: #3d1f20;
            --hover-bg: rgba(110, 118, 129, 0.2);
        }

        /* Professional Light Theme */
        [data-theme="light"] {
            --app-bg: #ffffff;
            --app-card: #f6f8fa;
            --app-input: #f6f8fa;
            --app-border: #d0d7de;
            --app-text: #1f2328;
            --app-text-secondary: #656d76;
            --app-muted: #8b949e;
            --app-primary: #0969da;
            --app-primary-hover: #0550ae;
            --app-success: #1a7f37;
            --app-success-bg: #dafbe1;
            --app-danger: #cf222e;
            --app-danger-bg: #ffebe9;
            --hover-bg: rgba(31, 35, 40, 0.08);
        }

        body {
            font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--app-bg) 0%, var(--app-card) 50%, var(--app-bg) 100%);
            color: var(--app-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        h1 {
            color: var(--app-text);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--app-text-secondary);
        }

        .glass {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--app-border);
        }

        /* Enhanced Input Styles */
        .auth-input {
            background-color: var(--app-input);
            border: 1px solid var(--app-border);
            color: var(--app-text);
            border-radius: 8px;
            padding: 14px 16px;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--app-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .auth-input::placeholder {
            color: var(--app-muted);
        }

        /* Tab Button Styles */
        .tab-btn {
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--app-primary) 0%, #1f6feb 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(88, 166, 255, 0.3);
        }

        .tab-btn:not(.active) {
            color: var(--app-text-secondary);
            background: transparent;
        }

        .tab-btn:not(.active):hover {
            color: var(--app-text);
            background: var(--hover-bg);
        }

        /* Message Styles */
        .message-error {
            background-color: var(--app-danger-bg);
            color: var(--app-danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .message-success {
            background-color: var(--app-success-bg);
            color: var(--app-success);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        /* Submit Button */
        .submit-btn {
            background: linear-gradient(135deg, var(--app-primary) 0%, #1f6feb 100%);
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 14px 24px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(88, 166, 255, 0.25);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(88, 166, 255, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Text color overrides for light theme */
        [data-theme="light"] .text-white {
            color: #1f2328 !important;
        }

        [data-theme="light"] .text-gray-100,
        [data-theme="light"] .text-gray-200,
        [data-theme="light"] .text-gray-300,
        [data-theme="light"] .text-gray-400,
        [data-theme="light"] .text-gray-500 {
            color: #656d76 !important;
        }

        [data-theme="light"] h1,
        [data-theme="light"] h2,
        [data-theme="light"] h3,
        [data-theme="light"] h4,
        [data-theme="light"] h5,
        [data-theme="light"] h6,
        [data-theme="light"] p,
        [data-theme="light"] span,
        [data-theme="light"] label {
            color: var(--app-text) !important;
        }

        /* Light theme tab adjustments */
        [data-theme="light"] .glass {
            background: rgba(246, 248, 250, 0.95);
            border-color: #d0d7de;
        }

        [data-theme="light"] .bg-\[\#21262d\] {
            background-color: #e8eaed !important;
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-4">

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الثيم">
        <svg id="theme-icon-dark" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg id="theme-icon-light" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
    </button>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Update icon
            document.getElementById('theme-icon-dark').style.display = newTheme === 'dark' ? 'block' : 'none';
            document.getElementById('theme-icon-light').style.display = newTheme === 'light' ? 'block' : 'none';
        }

        // Load saved theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon-dark').style.display = savedTheme === 'dark' ? 'block' : 'none';
            document.getElementById('theme-icon-light').style.display = savedTheme === 'light' ? 'block' : 'none';
        });
    </script>

    <div class="w-full max-w-md">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div
                class="w-24 h-24 mx-auto bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-500/30">
                <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold mb-2">GlobalTawasul</h1>
            <p class="text-base">منصة تواصل اجتماعي عربية</p>
        </div>

        <!-- Auth Card -->
        <div class="glass rounded-2xl p-6 shadow-2xl">
            <!-- Tabs -->
            <div class="flex mb-6 bg-[#21262d] rounded-xl p-1">
                <button id="tab-login" onclick="switchTab('login')"
                    class="tab-btn active flex-1">تسجيل الدخول</button>
                <button id="tab-register" onclick="switchTab('register')"
                    class="tab-btn flex-1">إنشاء حساب</button>
            </div>

            <!-- Error/Success Messages -->
            <div id="message" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

            <!-- Login Form -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-2" style="color: var(--app-text-secondary);">البريد الإلكتروني</label>
                        <input type="email" id="login-email" required
                            class="auth-input w-full"
                            placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="block text-sm mb-2" style="color: var(--app-text-secondary);">كلمة المرور</label>
                        <input type="password" id="login-password" required minlength="6"
                            class="auth-input w-full"
                            placeholder="••••••••">
                    </div>
                    <button type="submit" id="login-btn"
                        class="submit-btn w-full">
                        تسجيل الدخول
                    </button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="form-register" onsubmit="handleRegister(event)" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-2" style="color: var(--app-text-secondary);">الاسم</label>
                        <input type="text" id="register-name" required minlength="2"
                            class="auth-input w-full"
                            placeholder="اسمك">
                    </div>
                    <div>
                        <label class="block text-sm mb-2" style="color: var(--app-text-secondary);">اسم المستخدم</label>
                        <input type="text" id="register-username" required minlength="3"
                            class="auth-input w-full"
                            placeholder="username">
                    </div>
                    <div>
                        <label class="block text-sm mb-2" style="color: var(--app-text-secondary);">البريد الإلكتروني</label>
                        <input type="email" id="register-email" required
                            class="auth-input w-full"
                            placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="block text-sm mb-2" style="color: var(--app-text-secondary);">كلمة المرور</label>
                        <input type="password" id="register-password" required minlength="6"
                            class="auth-input w-full"
                            placeholder="6 أحرف على الأقل">
                    </div>
                    <button type="submit" id="register-btn"
                        class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-500/20">
                        إنشاء حساب
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-gray-700"></div>
                <span class="px-4 text-sm text-gray-500">أو</span>
                <div class="flex-1 h-px bg-gray-700"></div>
            </div>

            <!-- Google OAuth (قيد التطوير) -->
            <!--
            <button onclick="handleGoogleLogin()" id="google-btn"
                class="w-full py-3 bg-white hover:bg-gray-100 text-gray-800 font-medium rounded-xl transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                المتابعة مع Google
            </button>
            -->
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            جميع الحقوق محفوظة © 2024 GlobalTawasul
        </p>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Convex Client -->
    <script>
        // Local API configuration
        const API_BASE = '';

        // Helper function to call local API
        async function apiCall(endpoint, method = 'GET', data = null) {
            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) {
                    options.body = JSON.stringify(data);
                }
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || 'Request failed');
                }
                return result;
            } catch (error) {
                console.error('API error:', error);
                throw error;
            }
        }

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('tab-login').className = `flex-1 py-2.5 rounded-lg text-sm font-medium transition-all ${isLogin ? 'bg-blue-500 text-white' : 'text-gray-400 hover:text-white'}`;
            document.getElementById('tab-register').className = `flex-1 py-2.5 rounded-lg text-sm font-medium transition-all ${!isLogin ? 'bg-blue-500 text-white' : 'text-gray-400 hover:text-white'}`;
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-register').classList.toggle('hidden', isLogin);
            hideMessage();
        }

        function showMessage(text, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `mb-4 p-4 rounded-xl text-sm font-medium ${type === 'error' ? 'message-error' : 'message-success'}`;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        function setLoading(isLoading) {
            document.getElementById('loading').classList.toggle('hidden', !isLoading);
            document.querySelectorAll('button[type="submit"]').forEach(btn => {
                btn.disabled = isLoading;
                if (isLoading) {
                    btn.style.opacity = '0.6';
                    btn.style.cursor = 'not-allowed';
                } else {
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                }
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            setLoading(true);
            hideMessage();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const result = await apiCall('/api/auth/login', 'POST', { email, password });

                // Store session in localStorage
                localStorage.setItem('userId', result.userId);
                localStorage.setItem('userEmail', result.email);
                localStorage.setItem('userName', result.name);
                localStorage.setItem('userUsername', result.username);
                localStorage.setItem('userAvatar', result.avatarUrl || '');

                showMessage('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                setTimeout(() => window.location.href = '/', 1000);
            } catch (error) {
                showMessage(error.message || 'حدث خطأ أثناء تسجيل الدخول');
                setLoading(false);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            setLoading(true);
            hideMessage();

            const name = document.getElementById('register-name').value;
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const result = await apiCall('/api/auth/register', 'POST', {
                    email,
                    password,
                    name,
                    username
                });

                // Store session in localStorage
                localStorage.setItem('userId', result.userId);
                localStorage.setItem('userEmail', result.email);
                localStorage.setItem('userName', result.name);
                localStorage.setItem('userUsername', result.username);

                showMessage('تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
                setTimeout(() => window.location.href = '/', 1500);
            } catch (error) {
                showMessage(error.message || 'حدث خطأ أثناء إنشاء الحساب');
                setLoading(false);
            }
        }

        async function handleGoogleLogin() {
            showMessage('تسجيل الدخول عبر Google قيد التطوير حالياً', 'error');
        }

        // Check if already logged in
        function checkAuth() {
            const userId = localStorage.getItem('userId');
            if (userId) {
                window.location.href = '/';
            }
        }
        checkAuth();
    </script>
</body>

</html>
