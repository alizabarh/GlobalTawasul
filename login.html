<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTawasul - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { vazir: ['Vazirmatn', 'sans-serif'] } }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }

        .glass {
            background: rgba(22, 24, 28, 0.85);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 mx-auto bg-blue-500 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-500/30">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">GlobalTawasul</h1>
            <p class="text-gray-400">منصة تواصل اجتماعي عربية</p>
        </div>

        <!-- Auth Card -->
        <div class="glass rounded-2xl p-6 border border-gray-700 shadow-xl">
            <!-- Tabs -->
            <div class="flex mb-6 bg-gray-800 rounded-xl p-1">
                <button id="tab-login" onclick="switchTab('login')"
                    class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all bg-blue-500 text-white">تسجيل
                    الدخول</button>
                <button id="tab-register" onclick="switchTab('register')"
                    class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">إنشاء
                    حساب</button>
            </div>

            <!-- Error/Success Messages -->
            <div id="message" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

            <!-- Login Form -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">البريد الإلكتروني</label>
                        <input type="email" id="login-email" required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                            placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">كلمة المرور</label>
                        <input type="password" id="login-password" required minlength="6"
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                            placeholder="••••••••">
                    </div>
                    <button type="submit" id="login-btn"
                        class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-500/20">
                        تسجيل الدخول
                    </button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="form-register" onsubmit="handleRegister(event)" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">الاسم</label>
                        <input type="text" id="register-name" required minlength="2"
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                            placeholder="اسمك">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">اسم المستخدم</label>
                        <input type="text" id="register-username" required minlength="3"
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                            placeholder="username">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">البريد الإلكتروني</label>
                        <input type="email" id="register-email" required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                            placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">كلمة المرور</label>
                        <input type="password" id="register-password" required minlength="6"
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                            placeholder="6 أحرف على الأقل">
                    </div>
                    <button type="submit" id="register-btn"
                        class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-500/20">
                        إنشاء حساب
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-gray-700"></div>
                <span class="px-4 text-sm text-gray-500">أو</span>
                <div class="flex-1 h-px bg-gray-700"></div>
            </div>

            <!-- Google OAuth -->
            <button onclick="handleGoogleLogin()" id="google-btn"
                class="w-full py-3 bg-white hover:bg-gray-100 text-gray-800 font-medium rounded-xl transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                المتابعة مع Google
            </button>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            جميع الحقوق محفوظة © 2024 GlobalTawasul
        </p>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ghiogrlzrzdskrtymgpc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoaW9ncmx6cnpkc2tydHltZ3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjg2NjQsImV4cCI6MjA4OTUwNDY2NH0.j0panRb0KL4CrJetFJ4_wqTxe6iMvzk5a1C0HmynFQc';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('tab-login').className = `flex-1 py-2.5 rounded-lg text-sm font-medium transition-all ${isLogin ? 'bg-blue-500 text-white' : 'text-gray-400 hover:text-white'}`;
            document.getElementById('tab-register').className = `flex-1 py-2.5 rounded-lg text-sm font-medium transition-all ${!isLogin ? 'bg-blue-500 text-white' : 'text-gray-400 hover:text-white'}`;
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-register').classList.toggle('hidden', isLogin);
            hideMessage();
        }

        function showMessage(text, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `mb-4 p-3 rounded-xl text-sm ${type === 'error' ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-green-500/20 text-green-400 border border-green-500/30'}`;
            el.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        function setLoading(isLoading) {
            document.getElementById('loading').classList.toggle('hidden', !isLoading);
            document.querySelectorAll('button[type="submit"], #google-btn').forEach(btn => {
                btn.disabled = isLoading;
                btn.opacity = isLoading ? '0.5' : '1';
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            setLoading(true);
            hideMessage();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showMessage(error.message === 'Invalid login credentials' ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة' : error.message);
                setLoading(false);
            } else {
                window.location.href = '/';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            setLoading(true);
            hideMessage();

            const name = document.getElementById('register-name').value;
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            const { data, error } = await _supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: name, username: username }
                }
            });

            if (error) {
                showMessage(error.message);
                setLoading(false);
            } else {
                showMessage('تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
                setTimeout(() => window.location.href = '/', 1500);
            }
        }

        async function handleGoogleLogin() {
            setLoading(true);
            hideMessage();

            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/'
                }
            });

            if (error) {
                showMessage(error.message);
                setLoading(false);
            }
        }

        // Check if already logged in
        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = '/';
            }
        }
        checkAuth();
    </script>
</body>

</html>
